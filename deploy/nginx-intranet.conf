# ─────────────────────────────────────────────────────────────────────────────
# Groundlink III — Safety Dashboard (self-hosted on Hetzner)
# Expose the local Node service (127.0.0.1:3000) at:
#     https://intranet.groundlinkhandling.pt/dashboards/safety/
#
# Paste these two blocks INSIDE the existing `server { ... }` block that serves
# intranet.groundlinkhandling.pt (the TLS vhost). Then:
#     sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# The frontend uses relative URLs against <base href="/dashboards/safety/">, so
# the browser requests /dashboards/safety/ , /dashboards/safety/logo.png and
# /dashboards/safety/api/* . The trailing slash on proxy_pass strips the prefix:
#     /dashboards/safety/api/smartsheet  ->  http://127.0.0.1:3000/api/smartsheet

# Normalise the no-trailing-slash visit so <base> resolves correctly.
location = /dashboards/safety {
    return 301 /dashboards/safety/;
}

location /dashboards/safety/ {
    proxy_pass http://127.0.0.1:3000/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;
}
